name: scrape

on:
  schedule:
    # Top of every hour (UTC). cron fires are best-effort and can be delayed
    # by a few minutes under GitHub load — fine for an hourly tracker.
    - cron: "0 * * * *"
  workflow_dispatch: {} # adds a "Run workflow" button for manual runs

# Needed so the job can commit the updated tracker DB back to the repo.
permissions:
  contents: write

# If a run is still going when the next hour fires, let it finish rather than
# stacking browsers on top of each other.
concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium + OS deps
        run: npx playwright install --with-deps chromium

      - name: Scrape
        run: node src/index.js scrape

      - name: Commit updated tracker
        run: |
          git config user.name  "yad2-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cars.json
          # Only commit when something actually changed.
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "scrape: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
